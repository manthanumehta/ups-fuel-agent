name: Morning UPS Agent

on:
  schedule:
    # This runs at 8:00 AM India Time (Monday to Friday)
    - cron: '30 2 * * 1-5' 
  workflow_dispatch:      # This adds a "Run" button so you can test it manually

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      # 1. Get your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Prepare the computer with Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install the tools needed (Pandas, Excel writer, etc.)
      - name: Install Dependencies
        run: |
          pip install pandas requests cloudscraper openpyxl matplotlib beautifulsoup4 lxml

      # 4. Run your UPS Script
      - name: Run UPS Agent
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python ups_agent.py
