name: Morning UPS Agent

on:
  schedule:
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

# This guarantees the agent has permission to save the Excel file
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl matplotlib beautifulsoup4 selenium webdriver-manager
      
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run UPS Agent
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python ups_agent.py
      
      - name: Commit and Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated UPS Data Update"
          file_pattern: ups_fuel_history.xlsx
