name: Morning UPS Agent

on:
  schedule:
    # 04:30 UTC is exactly 10:00 AM IST all 7 days
    - cron: '47 4 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for saving the Excel file
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl matplotlib beautifulsoup4 selenium webdriver-manager
      
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run UPS Agent
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python ups_agent.py
      
      - name: Commit and Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated UPS Data Update"
          file_pattern: ups_fuel_history.xlsx
